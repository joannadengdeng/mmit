# Colab: LLaVA-MoLE training (sparse mixture of LoRA experts)
# Chen et al., 2024 — mitigates data conflicts in multi-source mixing
#
# 适合混合多个数据源（OCRVQA + TextVQA + 通用 VQA 等）
# T4 16GB 可跑（bf16 模式），A100 效果更佳
#
# Usage:
#   python -m mmit.training --config configs/colab_mole.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: mole
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  save_steps: 100
  output_dir: "mole_colab_run"
  params:
    num_experts: 4
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    balance_loss_coeff: 0.01
    freeze_patterns: ["visual", "vision"]

data:
  adapter: hf_datasets
  data_path: "HuggingFaceH4/llava-instruct-mix-vsft"
  split: train
  max_samples: 50
