# Colab: ReFT/LoReFT training (representation finetuning)
# Wu et al., NeurIPS 2024 — 15-65x more efficient than LoRA
#
# LLM 完全冻结，学习隐层表示上的低秩干预
# T4 16GB 即可运行（bf16 模式）
#
# Usage:
#   python -m mmit.training --config configs/colab_reft.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: reft
  num_epochs: 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-3
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 200
  output_dir: "reft_colab_run"
  params:
    intervention_rank: 4
    positions: "f4+l5"
    dropout: 0.05
    share_weights: false
    steer_visual_only: false
    ortho_loss_coeff: 0.01

data:
  adapter: hf_datasets
  data_path: "HuggingFaceH4/llava-instruct-mix-vsft"
  split: train
  max_samples: 500
