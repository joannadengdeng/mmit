# SSH: MoReS training on a remote server
# MoReS is extremely parameter-efficient, works well even on smaller GPUs

runtime:
  mode: ssh
  ssh:
    host: "192.168.1.100"
    port: 22
    username: "root"
    key_path: "~/.ssh/id_rsa"
    conda_env: "mmit"

model:
  model_path: "Qwen/Qwen2.5-VL-7B-Instruct"

training:
  ft_method: mores
  num_epochs: 3
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  save_steps: 500
  output_dir: "output/mores_qwen2vl_7b"
  params:
    intervention_rank: 4
    positions: "f4+l5"
    dropout: 0.0
    ortho_penalty_weight: 0.01

data:
  adapter: hf_datasets
  data_path: "HuggingFaceH4/llava-instruct-mix-vsft"
  split: train
  max_samples: 200
