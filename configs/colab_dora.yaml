# Colab: DoRA training (weight-decomposed LoRA)
# Liu et al., ICML 2024 — drop-in upgrade over standard LoRA
#
# Usage:
#   python -m mmit.training --config configs/colab_dora.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: dora
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  save_steps: 100
  output_dir: "dora_colab_run"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05

data:
  adapter: hf_datasets
  data_path: "HuggingFaceH4/llava-instruct-mix-vsft"
  split: train
  max_samples: 50
